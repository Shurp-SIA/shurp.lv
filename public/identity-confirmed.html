<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Confirmed | Shurp</title>
    <!-- Use your Inter font as per your index.html -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFF9F5;
        }

        .shurp-blue-bg {
            background-color: #125E8A;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-sm w-full bg-white p-10 rounded-[2.5rem] shadow-2xl border border-[#E2E8F0] text-center">
        <!-- Brand Logo -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-[#125E8A]">Shurp</h1>
        </div>

        <!-- Latvian -->
        <h2 class="text-2xl font-bold mb-4 text-[#1F2933]">Identitāte apstiprināta!</h2>
        <p class="text-[#1F2933]/70 mb-6 leading-relaxed">
            Jūsu e-pasts ir veiksmīgi apstiprināts. Jūs varat atgriezties lietotnē.
        </p>

        <!-- English -->
        <h2 class="text-xl font-semibold mb-4 text-[#1F2933]">Identity confirmed!</h2>
        <p class="text-[#1F2933]/70 mb-8 leading-relaxed">
            Your email has been successfully verified. You can return to the app now.
        </p>

        <!-- The Smart Button -->
        <a href="io.supabase.shurp://login-callback/"
            class="shurp-blue-bg block w-full py-4 rounded-full font-bold text-white hover:opacity-90 transition mb-4">
            Atgriezties Shurp / Return to Shurp
        </a>

        <p class="text-[#1F2933]/40 text-xs mt-8">Ai Laila - Shurp AI assistant</p>
    </div>

    <script>
        // Automatic trigger: The phone will attempt to open the app immediately
        window.location.href = "io.supabase.shurp://login-callback/";
    </script>
</body>

</html>
