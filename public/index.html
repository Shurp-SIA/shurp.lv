<!DOCTYPE html>
<html lang="lv">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shurp</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://shurp.lv/" />

    <!-- Hreflang for SEO -->
    <link rel="alternate" href="https://shurp.lv/en/" hreflang="en" />
    <link rel="alternate" href="https://shurp.lv/lv/" hreflang="lv" />
    <link rel="alternate" href="https://shurp.lv/lv/" hreflang="x-default" />

    <!-- Minimal critical CSS for loader -->
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            background-color: #125E8A;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    <!-- Ultra-light redirect -->
    <script>
        (function () {
            try {
                var lang = (navigator.languages && navigator.languages.length)
                    ? navigator.languages[0]
                    : (navigator.language || 'lv');

                lang = lang.toLowerCase();

                var target = lang.startsWith('en') ? '/en/' : '/lv/';

                if (location.pathname !== target) {
                    location.replace(target);
                }
            } catch (e) {
                location.replace('/lv/');
            }
        })();
    </script>

    <!-- No-JS fallback -->
    <noscript>
        <meta http-equiv="refresh" content="0; url=/lv/" />
    </noscript>
</head>

<body>
    <div class="loader" aria-hidden="true"></div>
</body>

</html>
